<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prode Mundial 2026 - Legal</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Lexend', sans-serif;
            background: #0d1c2b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        h1 {
            color: #0d1c2b;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .links a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: #f6f7f8;
            border-radius: 12px;
            text-decoration: none;
            color: #0d1c2b;
            font-weight: 600;
            font-size: 15px;
            transition: background 0.2s;
        }
        .links a:hover { background: #e2e8f0; }
        .links a span { color: #d4af37; font-size: 18px; }
        .footer {
            margin-top: 24px;
            color: #475569;
            font-size: 12px;
        }
        .accent-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">⚽</div>
        <h1>Prode Mundial 2026</h1>
        <p class="subtitle">Información legal</p>
        <div class="links">
            <a href="terms.html">Términos de Uso <span>→</span></a>
            <a href="privacy.html">Política de Privacidad <span>→</span></a>
            <a href="delete.html">Eliminación de Datos <span>→</span></a>
        </div>
        <p class="footer">Facundo Campo — 2026</p>
    </div>
    <div class="accent-bar"></div>
</body>
</html>
